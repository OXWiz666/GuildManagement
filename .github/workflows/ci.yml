name: CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
      DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET || 'ci-access-secret-at-least-32-chars' }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'ci-refresh-secret-at-least-32-chars' }}
      JWT_ACCESS_EXPIRY: ${{ secrets.JWT_ACCESS_EXPIRY || '1d' }}
      JWT_REFRESH_EXPIRY: ${{ secrets.JWT_REFRESH_EXPIRY || '7d' }}
      BCRYPT_ROUNDS: ${{ secrets.BCRYPT_ROUNDS || '12' }}
      NODE_ENV: production
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://ci.supabase.co' }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || 'ci-supabase-key' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://ci.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'ci-supabase-publishable-key' }}
      NEXT_PUBLIC_API_URL: "/api"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm/action-setup@v4 fails with "Multiple versions of pnpm specified"
      # once package.json declares "packageManager" (which this repo does,
      # pnpm@10.12.1) — the action can't tell its own default `version` input
      # apart from an explicit one, so it always sees two sources. Corepack
      # reads packageManager directly, giving pnpm a single source of truth.
      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm turbo run db:generate

      - name: Build
        run: pnpm build
