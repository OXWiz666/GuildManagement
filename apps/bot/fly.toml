# ForgeKeep Discord Bot — Fly.io
#
# Deploy from the REPO ROOT so the Docker build context includes the whole
# workspace (the bot imports @guild/core, @guild/db and @guild/shared):
#   fly deploy --config apps/bot/fly.toml --dockerfile apps/bot/Dockerfile
#
# Secrets (never commit these — set them with `fly secrets set`):
#   fly secrets set DISCORD_TOKEN=... DISCORD_CLIENT_ID=... \
#     DATABASE_URL=... DIRECT_URL=... \
#     JWT_ACCESS_SECRET=... JWT_REFRESH_SECRET=... \
#     SUPABASE_URL=... SUPABASE_KEY=...

app = "forgekeep-bot"
# Match the database's region — every command is DB-bound, and the round trip
# to Supabase dominates response time. ap-northeast-1 is the dev DB's home.
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"

[processes]
  bot = "pnpm --filter @guild/bot start"

# A Discord gateway client holds one persistent WebSocket and must never be
# suspended or scaled to zero — a sleeping bot silently stops responding.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["bot"]

# Exactly one instance. Two would each hold a gateway session and answer every
# command twice. The notification dedupe (notification_history.dedupe_key) makes
# scheduled sends safe under concurrency, but command replies are not deduped —
# so raise this only if you add shard coordination.
[deploy]
  strategy = "immediate"

[[restart]]
  policy = "always"
  retries = 10
